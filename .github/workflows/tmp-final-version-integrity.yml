name: Temporary final Version integrity verification
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/version-integrity-inspect-20260720
          fetch-depth: 0
      - run: npm ci
      - name: Contract verifiers
        run: |
          git fetch origin main
          export VERSION_INTEGRITY_CHANGED_FILES="$(git diff --name-only origin/main...HEAD)"
          npm run verify:risk-share-version-integrity
          npm run verify:risk-share-manager-publish-revision-integration
          npm run verify:risk-share-tenant-publish-revision-guard
      - name: Migration parse
        run: |
          sudo systemctl start postgresql
          sudo -u postgres createdb version_integrity_qa
          sudo -u postgres psql -v ON_ERROR_STOP=1 version_integrity_qa <<'SQL'
          create table public.risk_share_version_locks (id uuid not null, company_code text not null, primary key (id), unique (id, company_code));
          create table public.field_participation_submissions (id uuid primary key, tenant_code text not null, created_at timestamptz not null default now());
          SQL
          sudo -u postgres psql -v ON_ERROR_STOP=1 version_integrity_qa -f supabase/migrations/20260720020000_add_worker_confirmation_version_integrity.sql
      - name: Targeted lint
        run: npx eslint src/app/api/risk-share/participation/submit/route.ts src/app/risk-share/monthly/page.tsx src/app/risk-share/participation/page.tsx src/components/risk-share/monthly/MonthlyDesignerView.tsx src/lib/risk-share/riskSharePublicVersion.ts src/lib/risk-share/riskShareVersionConfirmation.ts src/lib/supabaseServer.ts scripts/verify-risk-share-version-integrity-contract.mjs
      - run: npm run build
      - name: Diff and legacy scope
        run: |
          git diff --check origin/main...HEAD
          ! git diff --name-only origin/main...HEAD | grep -E '(^|/)(daedo|dongwoo|hankookgreen|bubblemon|mons|richi)(/|$)'
