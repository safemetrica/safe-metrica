name: PR 912 contract fix

on:
  push:
    branches:
      - feat/add-tenant-risk-share-publish-rpc

permissions:
  contents: write

jobs:
  fix-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feat/add-tenant-risk-share-publish-rpc

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply approved contract corrections
        shell: bash
        run: |
          set -euo pipefail

          test "$(git rev-parse HEAD^)" = "c1ad96a8f468399e89f880bcae936a89e462ec55"

          python3 <<'PY'
          from pathlib import Path

          migration_path = Path("supabase/migrations/20260719010000_add_tenant_risk_share_publish_rpc.sql")
          verifier_path = Path("scripts/verify-risk-share-tenant-publish-rpc-contract.mjs")
          workflow_path = Path(".github/workflows/pr912-contract-fix.yml")

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected exactly one match, found {count}")
              return text.replace(old, new, 1)

          migration = migration_path.read_text()

          migration = replace_once(
              migration,
              """  v_final_snapshot_count integer;
          v_final_worker_visible_count integer;
          begin
          """,
              r"""  v_final_snapshot_count integer;
          v_final_worker_visible_count integer;
          v_replay_snapshot_count integer;
          v_replay_worker_visible_count integer;
          v_replay_live_item_count integer;
          v_replay_live_worker_visible_count integer;
          v_replay_live_item_ids uuid[];
          v_final_snapshot_item_ids uuid[];
          v_final_live_item_count integer;
          v_final_live_customer_confirmed_count integer;
          v_final_live_item_ids uuid[];
          v_eligible_worker_visible_ids uuid[];
          v_final_live_worker_visible_ids uuid[];
          v_control_char_pattern text := '[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]';
          begin
          """,
              "declare variables",
          )

          migration = replace_once(
              migration,
              """  if length(v_lock_title) = 0 or length(v_lock_title) > 200 then
          """,
              """  if length(v_lock_title) = 0
             or length(v_lock_title) > 160
             or v_lock_title ~ v_control_char_pattern then
          """,
              "lock title validation",
          )

          migration = replace_once(
              migration,
              """  if v_notes is not null and length(v_notes) > 800 then
          """,
              """  if v_notes is not null
             and (
               length(v_notes) > 500
               or v_notes ~ v_control_char_pattern
             ) then
          """,
              "notes validation",
          )

          migration = replace_once(
              migration,
              """  perform pg_advisory_xact_lock(
            hashtextextended('publish_risk_share_version_for_tenant:' || v_company_code, 0)
          );
          """,
              """  perform pg_catalog.pg_advisory_xact_lock(
            pg_catalog.hashtextextended(
              'publish_risk_share_version_for_tenant:' || v_company_code,
              0
            )
          );
          """,
              "qualified advisory lock",
          )

          migration = replace_once(
              migration,
              """    select coalesce(array_agg(source_item_id order by source_item_id), '{}')
            into v_stored_item_ids
            from public.risk_share_version_items
            where risk_share_version_items.version_lock_id = v_existing_lock.id;

            if v_existing_lock.lock_status = 'active'
               and v_existing_lock.actor_membership_id = p_actor_membership_id
               and v_existing_lock.lock_month = v_lock_month
               and v_existing_lock.lock_title = v_lock_title
               and coalesce(v_existing_lock.notes, '') = coalesce(v_notes, '')
               and v_existing_lock.item_count = v_requested_count
               and v_stored_item_ids = v_item_ids then
              return query select
                true, 'ok'::text, true,
                v_existing_lock.id, v_existing_lock.item_count, v_existing_lock.worker_visible_count;
              return;
            end if;
          """,
              """    select
              count(*)::integer,
              (count(*) filter (where worker_visible = true))::integer,
              coalesce(array_agg(source_item_id order by source_item_id), '{}'::uuid[])
            into
              v_replay_snapshot_count,
              v_replay_worker_visible_count,
              v_stored_item_ids
            from public.risk_share_version_items
            where risk_share_version_items.version_lock_id = v_existing_lock.id;

            select
              count(*)::integer,
              (count(*) filter (where worker_visible = true))::integer,
              coalesce(array_agg(id order by id), '{}'::uuid[])
            into
              v_replay_live_item_count,
              v_replay_live_worker_visible_count,
              v_replay_live_item_ids
            from public.risk_share_items
            where risk_share_items.company_code = v_company_code
              and risk_share_items.version_lock_id = v_existing_lock.id
              and risk_share_items.share_status = 'locked'
              and risk_share_items.customer_check_status = 'confirmed'
              and risk_share_items.customer_confirmed = true;

            if v_existing_lock.lock_status = 'active'
               and v_existing_lock.publish_action = 'publish'
               and v_existing_lock.actor_membership_id = p_actor_membership_id
               and v_existing_lock.lock_month = v_lock_month
               and v_existing_lock.lock_title = v_lock_title
               and coalesce(v_existing_lock.notes, '') = coalesce(v_notes, '')
               and v_existing_lock.item_count = v_requested_count
               and v_existing_lock.item_count = v_replay_snapshot_count
               and v_existing_lock.item_count = v_replay_live_item_count
               and v_existing_lock.worker_visible_count = v_replay_worker_visible_count
               and v_existing_lock.worker_visible_count = v_replay_live_worker_visible_count
               and v_stored_item_ids = v_item_ids
               and v_replay_live_item_ids = v_item_ids then
              return query select
                true, 'ok'::text, true,
                v_existing_lock.id, v_existing_lock.item_count, v_existing_lock.worker_visible_count;
              return;
            end if;
          """,
              "durable replay validation",
          )

          migration = replace_once(
              migration,
              """      and btrim(coalesce(risk_share_items.task_name, '')) <> ''
              and btrim(coalesce(risk_share_items.hazard, '')) <> ''
            order by risk_share_items.id asc
          """,
              """      and btrim(coalesce(risk_share_items.task_name, '')) <> ''
              and btrim(coalesce(risk_share_items.hazard, '')) <> ''
              and risk_share_items.review_revision >= 1
              and risk_share_items.worker_visible is not null
            order by risk_share_items.id asc
          """,
              "eligibility completeness",
          )

          migration = replace_once(
              migration,
              """  select
            coalesce(array_agg(locked_items.id order by locked_items.id), '{}'),
            coalesce(count(*) filter (where locked_items.worker_visible), 0)::integer
          into v_eligible_ids, v_eligible_worker_visible_count
          from locked_items;
          """,
              """  select
            coalesce(array_agg(locked_items.id order by locked_items.id), '{}'::uuid[]),
            coalesce(count(*) filter (where locked_items.worker_visible), 0)::integer,
            coalesce(
              array_agg(locked_items.id order by locked_items.id)
                filter (where locked_items.worker_visible),
              '{}'::uuid[]
            )
          into
            v_eligible_ids,
            v_eligible_worker_visible_count,
            v_eligible_worker_visible_ids
          from locked_items;
          """,
              "capture worker visibility",
          )

          migration = replace_once(
              migration,
              """    worker_visible_count,
            lock_status,
            notes,
          """,
              """    worker_visible_count,
            lock_status,
            locked_by,
            notes,
          """,
              "locked_by insert column",
          )

          migration = replace_once(
              migration,
              """    v_eligible_worker_visible_count,
            'active',
            v_notes,
          """,
              """    v_eligible_worker_visible_count,
            'active',
            v_membership_role,
            v_notes,
          """,
              "locked_by insert value",
          )

          migration = replace_once(
              migration,
              """  select count(*)
          into v_final_snapshot_count
          from public.risk_share_version_items
          where version_lock_id = v_lock_id;

          if v_final_snapshot_count <> v_item_count then
            raise exception
              'publish_risk_share_version_for_tenant: final snapshot count % does not match item_count % for lock %',
              v_final_snapshot_count, v_item_count, v_lock_id;
          end if;

          select count(*)
          into v_final_worker_visible_count
          from public.risk_share_version_items
          where version_lock_id = v_lock_id
            and worker_visible = true;

          if v_final_worker_visible_count <> v_eligible_worker_visible_count then
            raise exception
              'publish_risk_share_version_for_tenant: final worker_visible snapshot count % does not match expected % for lock %',
              v_final_worker_visible_count, v_eligible_worker_visible_count, v_lock_id;
          end if;
          """,
              """  select
            count(*)::integer,
            (count(*) filter (where worker_visible = true))::integer,
            coalesce(array_agg(source_item_id order by source_item_id), '{}'::uuid[])
          into
            v_final_snapshot_count,
            v_final_worker_visible_count,
            v_final_snapshot_item_ids
          from public.risk_share_version_items
          where version_lock_id = v_lock_id;

          if v_final_snapshot_count <> v_item_count then
            raise exception
              'publish_risk_share_version_for_tenant: final snapshot count % does not match item_count % for lock %',
              v_final_snapshot_count, v_item_count, v_lock_id;
          end if;

          if v_final_worker_visible_count <> v_eligible_worker_visible_count then
            raise exception
              'publish_risk_share_version_for_tenant: final worker_visible snapshot count % does not match expected % for lock %',
              v_final_worker_visible_count, v_eligible_worker_visible_count, v_lock_id;
          end if;

          if v_final_snapshot_item_ids <> v_item_ids then
            raise exception
              'publish_risk_share_version_for_tenant: final snapshot Item set does not match requested Item set for lock %',
              v_lock_id;
          end if;

          select
            count(*)::integer,
            (count(*) filter (where customer_confirmed = true))::integer,
            coalesce(array_agg(id order by id), '{}'::uuid[]),
            coalesce(
              array_agg(id order by id) filter (where worker_visible = true),
              '{}'::uuid[]
            )
          into
            v_final_live_item_count,
            v_final_live_customer_confirmed_count,
            v_final_live_item_ids,
            v_final_live_worker_visible_ids
          from public.risk_share_items
          where company_code = v_company_code
            and version_lock_id = v_lock_id
            and share_status = 'locked'
            and customer_check_status = 'confirmed';

          if v_final_live_item_count <> v_item_count
             or v_final_live_customer_confirmed_count <> v_item_count
             or v_final_live_item_ids <> v_item_ids then
            raise exception
              'publish_risk_share_version_for_tenant: final live Item state does not match requested Item set for lock %',
              v_lock_id;
          end if;

          if v_final_live_worker_visible_ids <> v_eligible_worker_visible_ids then
            raise exception
              'publish_risk_share_version_for_tenant: selected Item worker_visible values changed during publish for lock %',
              v_lock_id;
          end if;
          """,
              "success durable postconditions",
          )

          postcondition = r"""
          -- Fail the migration if the deployed tenant RPC does not retain the exact
          -- identity, return, owner, security, search_path, and direct-grant contract.
          do $$
          declare
            v_rpc_oid oid;
            v_total_count integer;
            v_exact_count integer;
            v_unexpected_acl_count integer;
            v_expected_argtypes oid[] := array[
              'text'::regtype::oid,
              'uuid'::regtype::oid,
              'text'::regtype::oid,
              'text'::regtype::oid,
              'text'::regtype::oid,
              '_uuid'::regtype::oid,
              'text'::regtype::oid
            ];
          begin
            select count(*) into v_total_count
            from pg_proc p
            join pg_namespace n on n.oid = p.pronamespace
            where n.nspname = 'public'
              and p.proname = 'publish_risk_share_version_for_tenant';

            select count(*) into v_exact_count
            from pg_proc p
            join pg_namespace n on n.oid = p.pronamespace
            where n.nspname = 'public'
              and p.proname = 'publish_risk_share_version_for_tenant'
              and array(select unnest(p.proargtypes::oid[])) = v_expected_argtypes;

            if v_total_count <> 1 or v_exact_count <> 1 then
              raise exception
                'publish_risk_share_version_for_tenant postcondition failed: exact overload count/signature mismatch';
            end if;

            select p.oid into v_rpc_oid
            from pg_proc p
            join pg_namespace n on n.oid = p.pronamespace
            where n.nspname = 'public'
              and p.proname = 'publish_risk_share_version_for_tenant'
              and array(select unnest(p.proargtypes::oid[])) = v_expected_argtypes;

            if pg_get_function_identity_arguments(v_rpc_oid) <>
                 'p_company_code text, p_actor_membership_id uuid, p_lock_month text, p_lock_title text, p_notes text, p_item_ids uuid[], p_idempotency_key text'
               or lower(pg_get_function_result(v_rpc_oid)) <>
                 lower('TABLE(ok boolean, code text, replayed boolean, version_lock_id uuid, item_count integer, worker_visible_count integer)') then
              raise exception
                'publish_risk_share_version_for_tenant postcondition failed: argument or return contract mismatch';
            end if;

            if not exists (
              select 1
              from pg_proc p
              join pg_roles r on r.oid = p.proowner
              where p.oid = v_rpc_oid
                and r.rolname = 'postgres'
                and p.prosecdef
                and p.proconfig = array['search_path=public, pg_temp']::text[]
            ) then
              raise exception
                'publish_risk_share_version_for_tenant postcondition failed: owner/security/search_path mismatch';
            end if;

            if not has_function_privilege('service_role', v_rpc_oid, 'EXECUTE')
               or has_function_privilege('anon', v_rpc_oid, 'EXECUTE')
               or has_function_privilege('authenticated', v_rpc_oid, 'EXECUTE') then
              raise exception
                'publish_risk_share_version_for_tenant postcondition failed: direct execute privilege mismatch';
            end if;

            select count(*) into v_unexpected_acl_count
            from pg_proc p
            cross join lateral aclexplode(coalesce(p.proacl, acldefault('f', p.proowner))) acl
            left join pg_roles grantee_role on grantee_role.oid = acl.grantee
            where p.oid = v_rpc_oid
              and acl.privilege_type = 'EXECUTE'
              and acl.grantee <> p.proowner
              and (
                acl.grantee = 0
                or grantee_role.rolname is distinct from 'service_role'
                or acl.is_grantable
              );

            if v_unexpected_acl_count <> 0 then
              raise exception
                'publish_risk_share_version_for_tenant postcondition failed: PUBLIC/unexpected/grant-option execute privilege';
            end if;
          end
          $$;

          """

          migration = replace_once(
              migration,
              """comment on function public.publish_risk_share_version_for_tenant(
          """,
              postcondition + "comment on function public.publish_risk_share_version_for_tenant(\n",
              "tenant migration postcondition",
          )

          migration_path.write_text(migration)

          verifier = verifier_path.read_text()

          verifier_additions = r"""
          check(
            "lock_title enforces 1-160 characters and rejects control characters",
            tenantFnBody?.includes("length(v_lock_title) > 160") &&
              tenantFnBody?.includes("v_lock_title ~ v_control_char_pattern"),
          );
          check(
            "notes enforce at most 500 characters and reject control characters",
            tenantFnBody?.includes("length(v_notes) > 500") &&
              tenantFnBody?.includes("v_notes ~ v_control_char_pattern"),
          );
          check(
            "SECURITY DEFINER advisory and hash functions are pg_catalog-qualified",
            tenantFnBody?.includes("pg_catalog.pg_advisory_xact_lock(") &&
              tenantFnBody?.includes("pg_catalog.hashtextextended("),
          );
          check(
            "eligible selection requires a valid review revision and non-null worker visibility",
            selectionCte?.includes("review_revision >= 1") &&
              selectionCte?.includes("worker_visible is not null"),
          );
          check(
            "tenant Version stores the verified membership role in locked_by",
            tenantFnBody?.includes("lock_status,\n    locked_by,\n    notes,") &&
              tenantFnBody?.includes("'active',\n    v_membership_role,\n    v_notes,"),
          );
          check(
            "idempotent replay verifies publish action and durable snapshot/live counts",
            tenantFnBody?.includes("v_existing_lock.publish_action = 'publish'") &&
              tenantFnBody?.includes("v_existing_lock.item_count = v_replay_snapshot_count") &&
              tenantFnBody?.includes("v_existing_lock.item_count = v_replay_live_item_count") &&
              tenantFnBody?.includes(
                "v_existing_lock.worker_visible_count = v_replay_worker_visible_count",
              ) &&
              tenantFnBody?.includes(
                "v_existing_lock.worker_visible_count = v_replay_live_worker_visible_count",
              ),
          );
          check(
            "idempotent replay verifies exact snapshot and live Item sets",
            tenantFnBody?.includes("v_stored_item_ids = v_item_ids") &&
              tenantFnBody?.includes("v_replay_live_item_ids = v_item_ids"),
          );
          check(
            "success verifies the exact final snapshot Item set",
            tenantFnBody?.includes("v_final_snapshot_item_ids <> v_item_ids"),
          );
          check(
            "success verifies live locked Item count, tenant linkage, and customer confirmation",
            tenantFnBody?.includes("v_final_live_item_count <> v_item_count") &&
              tenantFnBody?.includes("v_final_live_customer_confirmed_count <> v_item_count") &&
              tenantFnBody?.includes("v_final_live_item_ids <> v_item_ids") &&
              tenantFnBody?.includes("version_lock_id = v_lock_id"),
          );
          check(
            "success verifies selected Item worker_visible values remain unchanged",
            tenantFnBody?.includes(
              "v_final_live_worker_visible_ids <> v_eligible_worker_visible_ids",
            ),
          );
          check(
            "tenant migration has exact overload, argument, and return postconditions",
            tenantSrc.includes("exact overload count/signature mismatch") &&
              tenantSrc.includes("argument or return contract mismatch") &&
              tenantSrc.includes("pg_get_function_identity_arguments(v_rpc_oid)") &&
              tenantSrc.includes("pg_get_function_result(v_rpc_oid)"),
          );
          check(
            "tenant migration has owner, security, search_path, and service-role-only postconditions",
            tenantSrc.includes("owner/security/search_path mismatch") &&
              tenantSrc.includes("direct execute privilege mismatch") &&
              tenantSrc.includes("PUBLIC/unexpected/grant-option execute privilege"),
          );
          """

          verifier = replace_once(
              verifier,
              """// =========================================================================
          // F. Response/out-of-scope boundaries and PR scope
          // =========================================================================
          """,
              verifier_additions + "\n// =========================================================================\n// F. Response/out-of-scope boundaries and PR scope\n// =========================================================================\n",
              "verifier contract additions",
          )

          verifier_path.write_text(verifier)

          if not workflow_path.exists():
              raise SystemExit("temporary workflow file is missing")
          workflow_path.unlink()
          PY

          git config user.name "SafeMetrica Contract Fix"
          git config user.email "contract-fix@safemetrica.invalid"
          git add \
            supabase/migrations/20260719010000_add_tenant_risk_share_publish_rpc.sql \
            scripts/verify-risk-share-tenant-publish-rpc-contract.mjs \
            .github/workflows/pr912-contract-fix.yml
          git diff --cached --check
          git commit -m "fix: complete tenant publish contract"

      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ripgrep
          npm ci --silent

      - name: Run complete verification
        shell: bash
        run: |
          set -euo pipefail
          npm run verify:risk-share-tenant-publish-rpc
          npm run verify:risk-share-preparation-read-model
          npm run verify:risk-share-preparation-api
          npm run verify:risk-share-preparation-ui
          npm run smoke:legacy-routes
          npm run build
          git diff --check origin/main...HEAD
          test "$(git diff --name-only origin/main...HEAD | wc -l | tr -d ' ')" = "4"

      - name: Push verified correction
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:feat/add-tenant-risk-share-publish-rpc
