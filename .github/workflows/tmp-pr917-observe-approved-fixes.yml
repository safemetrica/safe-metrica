name: Observe Approved PR 917 Fixes

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  observe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Wait for patch workflow
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.payload.pull_request.head.sha;
            const expectedName = "Apply Approved PR 917 Fixes";

            for (let attempt = 0; attempt < 100; attempt += 1) {
              const response = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                head_sha: sha,
                event: "push",
                per_page: 100,
              });

              const run = response.data.workflow_runs.find(
                (candidate) => candidate.name === expectedName,
              );

              if (run?.status === "completed") {
                core.info(`Observed patch run ${run.id}: ${run.conclusion}`);
                if (run.conclusion !== "success") {
                  core.setFailed(`Patch workflow concluded ${run.conclusion}: ${run.html_url}`);
                }
                return;
              }

              await new Promise((resolve) => setTimeout(resolve, 10000));
            }

            core.setFailed("Timed out waiting for approved PR #917 patch workflow.");
