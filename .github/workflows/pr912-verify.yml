name: PR 912 full verification

on:
  push:
    branches:
      - feat/add-tenant-risk-share-publish-rpc
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove temporary workflow from local verification diff
        shell: bash
        run: |
          git config user.name "SafeMetrica Verification"
          git config user.email "verification@safemetrica.invalid"
          git rm --quiet .github/workflows/pr912-verify.yml
          git commit --quiet -m "temp: remove verification harness from diff"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Run complete verification and capture logs
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/pr912-verify

          run_check() {
            name="$1"
            shift
            echo "RUN $name"
            "$@" > "/tmp/pr912-verify/${name}.log" 2>&1
            status=$?
            echo "$status" > "/tmp/pr912-verify/${name}.status"
            echo "EXIT $name=$status"
          }

          run_check tenant-publish npm run verify:risk-share-tenant-publish-rpc
          run_check preparation-read npm run verify:risk-share-preparation-read-model
          run_check preparation-api npm run verify:risk-share-preparation-api
          run_check preparation-ui npm run verify:risk-share-preparation-ui
          run_check legacy-smoke npm run smoke:legacy-routes
          run_check build npm run build
          run_check diff-check git diff --check origin/main...HEAD

          exit 0

      - name: Upload complete verification logs
        uses: actions/upload-artifact@v4
        with:
          name: pr912-full-verification
          path: /tmp/pr912-verify
          if-no-files-found: error
          retention-days: 1

      - name: Enforce complete verification
        shell: bash
        run: |
          set +e
          failed=0
          for status_file in /tmp/pr912-verify/*.status; do
            name="$(basename "$status_file" .status)"
            status="$(cat "$status_file")"
            echo "$name=$status"
            if [ "$status" -ne 0 ]; then
              echo "=== $name failure ==="
              tail -120 "/tmp/pr912-verify/${name}.log"
              failed=1
            fi
          done
          exit "$failed"
