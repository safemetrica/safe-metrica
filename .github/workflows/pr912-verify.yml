name: PR 912 full verification

on:
  push:
    branches:
      - feat/add-tenant-risk-share-publish-rpc
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Capture tenant publish RPC contract
        shell: bash
        run: |
          set +e
          npm run verify:risk-share-tenant-publish-rpc > /tmp/tenant-publish-verify.log 2>&1
          echo "$?" > /tmp/tenant-publish-verify.status
          exit 0

      - name: Upload tenant publish verifier log
        uses: actions/upload-artifact@v4
        with:
          name: pr912-tenant-publish-verifier
          path: |
            /tmp/tenant-publish-verify.log
            /tmp/tenant-publish-verify.status
          if-no-files-found: error
          retention-days: 1

      - name: Enforce tenant publish RPC contract
        shell: bash
        run: |
          status="$(cat /tmp/tenant-publish-verify.status)"
          if [ "$status" -ne 0 ]; then
            tail -120 /tmp/tenant-publish-verify.log
            exit "$status"
          fi
          tail -8 /tmp/tenant-publish-verify.log

      - name: Preparation read model contract
        run: npm run verify:risk-share-preparation-read-model

      - name: Preparation API contract
        run: npm run verify:risk-share-preparation-api

      - name: Preparation UI contract
        run: npm run verify:risk-share-preparation-ui

      - name: Legacy route smoke
        run: npm run smoke:legacy-routes

      - name: Production build
        run: npm run build

      - name: Diff check
        run: git diff --check origin/main...HEAD
