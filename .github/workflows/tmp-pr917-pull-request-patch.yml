name: Patch Approved PR 917 via Pull Request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.event.pull_request.number == 917 }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/add-tenant-publish-revision-guard
          fetch-depth: 0

      - name: Apply approved fixes
        run: python .github/tmp_pr917_patch.py

      - name: Commit and push when changed
        shell: bash
        run: |
          git diff --check
          if git diff --quiet; then
            echo "No patch changes required."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            supabase/migrations/20260720010000_add_tenant_risk_share_publish_revision_guard.sql \
            scripts/verify-risk-share-tenant-publish-revision-guard-contract.mjs
          git commit -m "fix: align revision guard with bigint SSOT"
          git push origin HEAD:feat/add-tenant-publish-revision-guard
