name: Temporary verify Version integrity PR

on:
  push:
    branches:
      - work/version-integrity-inspect-20260720
    paths:
      - ".github/workflows/tmp-version-integrity-inspect.yml"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/version-integrity-inspect-20260720
          fetch-depth: 0
      - name: Install
        run: npm ci
      - name: Contract verifiers
        run: |
          git fetch origin main
          export VERSION_INTEGRITY_CHANGED_FILES="$(git diff --name-only origin/main...HEAD)"
          npm run verify:risk-share-version-integrity
          npm run verify:risk-share-manager-publish-revision-integration
          npm run verify:risk-share-tenant-publish-revision-guard
      - name: Migration parse and catalog contract
        run: |
          sudo systemctl start postgresql
          sudo -u postgres createdb version_integrity_qa
          sudo -u postgres psql -v ON_ERROR_STOP=1 version_integrity_qa <<'SQL'
          create table public.risk_share_version_locks (
            id uuid not null,
            company_code text not null,
            primary key (id),
            unique (id, company_code)
          );
          create table public.field_participation_submissions (
            id uuid primary key,
            tenant_code text not null,
            created_at timestamptz not null default now()
          );
          SQL
          sudo -u postgres psql -v ON_ERROR_STOP=1 version_integrity_qa             -f supabase/migrations/20260720020000_add_worker_confirmation_version_integrity.sql
          sudo -u postgres psql -v ON_ERROR_STOP=1 -At version_integrity_qa <<'SQL' | grep -Fx "4|1|1"
          select
            count(*) filter (where column_name in (
              'version_lock_id',
              'confirmed_share_item_ids',
              'confirmation_idempotency_key',
              'confirmation_request_digest'
            )) || '|' ||
            count(*) filter (where constraint_name = 'field_participation_version_tenant_fkey') || '|' ||
            count(*) filter (where constraint_name = 'field_participation_tenant_confirmation_idempotency_key')
          from information_schema.columns c
          full join information_schema.table_constraints t
            on false
          where (c.table_schema = 'public' and c.table_name = 'field_participation_submissions')
             or (t.table_schema = 'public' and t.table_name = 'field_participation_submissions');
          SQL
      - name: Targeted lint
        run: |
          npx eslint             src/app/api/risk-share/participation/submit/route.ts             src/app/risk-share/monthly/page.tsx             src/app/risk-share/participation/page.tsx             src/components/risk-share/monthly/MonthlyDesignerView.tsx             src/lib/risk-share/riskSharePublicVersion.ts             src/lib/risk-share/riskShareVersionConfirmation.ts             src/lib/supabaseServer.ts             scripts/verify-risk-share-version-integrity-contract.mjs
      - name: Build
        run: npm run build
      - name: Diff and scope
        run: |
          git diff --check origin/main...HEAD
          ! git diff --name-only origin/main...HEAD | grep -E '(^|/)(daedo|dongwoo|hankookgreen|bubblemon|mons|richi)(/|$)'
      - name: Record temporary evidence
        run: |
          {
            echo "head=$(git rev-parse HEAD)"
            echo "main=$(git rev-parse origin/main)"
            echo "contract=PASS"
            echo "migration_parse=PASS"
            echo "lint=PASS"
            echo "build=PASS"
            echo "diff_check=PASS"
            echo "legacy_scope=PASS"
          } > .tmp-version-integrity-verify-status
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .tmp-version-integrity-verify-status
          git commit -m "chore: record temporary Version integrity verification"
          git push origin HEAD:work/version-integrity-inspect-20260720
