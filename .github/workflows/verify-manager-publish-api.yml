name: Verify Manager Publish API

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/app/api/risk-share/manager/publish/route.ts"
      - "src/lib/risk-share/riskShareTenantPublish.ts"
      - "scripts/verify-risk-share-manager-publish-api-contract.mjs"
      - "package.json"
      - ".github/workflows/verify-manager-publish-api.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Manager Publish API contract
        run: npm run verify:risk-share-manager-publish-api

      - name: Verify tenant Publish RPC contract
        run: npm run verify:risk-share-tenant-publish-rpc

      - name: Verify Preparation API contract
        run: npm run verify:risk-share-preparation-api

      - name: Verify Preparation Read Model contract
        run: npm run verify:risk-share-preparation-read-model

      - name: Verify Preparation UI contract
        run: npm run verify:risk-share-preparation-ui

      - name: Targeted ESLint
        run: >-
          npx eslint
          src/app/api/risk-share/manager/publish/route.ts
          src/lib/risk-share/riskShareTenantPublish.ts
          scripts/verify-risk-share-manager-publish-api-contract.mjs

      - name: Legacy route smoke
        run: npm run smoke:legacy-routes

      - name: Build
        run: npm run build

      - name: Diff check
        run: git diff --check origin/${{ github.base_ref }}...HEAD
