name: Final Verify Tenant Publish Revision Guard

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies and smoke dependency
        run: |
          npm ci
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Verify revision guard and existing publish contracts
        run: |
          npm run verify:risk-share-tenant-publish-revision-guard
          npm run verify:risk-share-tenant-publish-rpc
          npm run verify:risk-share-manager-publish-api
          npm run verify:risk-share-manager-publish-read-model

      - name: Verify Preparation contracts
        run: |
          npm run verify:risk-share-preparation-read-model
          npm run verify:risk-share-preparation-api
          npm run verify:risk-share-preparation-ui

      - name: Targeted lint
        run: npx eslint scripts/verify-risk-share-tenant-publish-revision-guard-contract.mjs

      - name: Legacy route smoke
        run: npm run smoke:legacy-routes

      - name: Build
        run: npm run build

      - name: Diff and product scope checks
        run: |
          git diff --check origin/main...HEAD
          mapfile -t product_changed < <(
            git diff --name-only origin/main...HEAD \
              | grep -v '^.github/workflows/' \
              | sort
          )
          expected=(
            "package.json"
            "scripts/verify-risk-share-tenant-publish-revision-guard-contract.mjs"
            "supabase/migrations/20260720010000_add_tenant_risk_share_publish_revision_guard.sql"
          )
          printf '%s\n' "${product_changed[@]}"
          test "${#product_changed[@]}" -eq "${#expected[@]}"
          for index in "${!expected[@]}"; do
            test "${product_changed[$index]}" = "${expected[$index]}"
          done
