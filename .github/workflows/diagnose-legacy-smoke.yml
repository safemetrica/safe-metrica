name: Diagnose Legacy Route Smoke

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run legacy route smoke with full output
        shell: bash
        run: |
          set +e
          npm run smoke:legacy-routes 2>&1 | tee /tmp/legacy-smoke.log
          status=${PIPESTATUS[0]}
          printf '%s\n' "$status" > /tmp/legacy-smoke-exit.txt
          echo "SMOKE_EXIT=$status"
          echo "--- LAST 80 LINES ---"
          tail -80 /tmp/legacy-smoke.log
          exit 0

      - name: Upload legacy smoke diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: legacy-smoke-diagnostics
          path: |
            /tmp/legacy-smoke.log
            /tmp/legacy-smoke-exit.txt
          if-no-files-found: error
          retention-days: 1

      - name: Fail when legacy smoke failed
        shell: bash
        run: test "$(cat /tmp/legacy-smoke-exit.txt)" = "0"
