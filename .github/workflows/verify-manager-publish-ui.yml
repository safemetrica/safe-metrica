name: Verify Manager Publish UI

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/app/risk-share/manager/share-review/publish/**"
      - "src/app/risk-share/manager/share-review/page.tsx"
      - "scripts/verify-risk-share-manager-publish-ui-contract.mjs"
      - "package.json"
      - ".github/workflows/verify-manager-publish-ui.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install smoke dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Verify Manager Publish UI contract
        run: npm run verify:risk-share-manager-publish-ui

      - name: Verify Manager Publish Read Model contract
        run: npm run verify:risk-share-manager-publish-read-model

      - name: Verify Manager Publish API contract
        run: npm run verify:risk-share-manager-publish-api

      - name: Verify tenant Publish RPC contract
        run: npm run verify:risk-share-tenant-publish-rpc

      - name: Verify Preparation API contract
        run: npm run verify:risk-share-preparation-api

      - name: Verify Preparation Read Model contract
        run: npm run verify:risk-share-preparation-read-model

      - name: Verify Preparation UI contract
        run: npm run verify:risk-share-preparation-ui

      - name: Targeted ESLint
        run: >-
          npx eslint
          src/app/risk-share/manager/share-review/publish/page.tsx
          src/app/risk-share/manager/share-review/publish/PublishClient.tsx
          src/app/risk-share/manager/share-review/page.tsx
          scripts/verify-risk-share-manager-publish-ui-contract.mjs

      - name: Legacy route smoke
        run: npm run smoke:legacy-routes

      - name: Build
        run: npm run build

      - name: Diff check
        run: git diff --check origin/${{ github.base_ref }}...HEAD
