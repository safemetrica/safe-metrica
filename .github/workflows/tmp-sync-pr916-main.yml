name: Temporary verify PR 916 revision integration v5

on:
  push:
    branches:
      - feat/add-manager-publish-ui
    paths:
      - ".github/workflows/tmp-sync-pr916-main.yml"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/add-manager-publish-ui
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Run and capture verification
        run: |
          set +e
          {
            npm ci &&
            npm run verify:risk-share-manager-publish-revision-integration &&
            npm run verify:risk-share-manager-publish-api &&
            npm run verify:risk-share-manager-publish-read-model &&
            npm run verify:risk-share-manager-publish-ui &&
            npm run verify:risk-share-tenant-publish-revision-guard &&
            npm run verify:risk-share-tenant-publish-rpc &&
            npx eslint               src/lib/risk-share/riskShareManagerReview.ts               src/lib/risk-share/riskShareManagerPublishReadModel.ts               src/app/risk-share/manager/share-review/publish/page.tsx               src/app/risk-share/manager/share-review/publish/PublishClient.tsx               src/app/api/risk-share/manager/publish/route.ts               src/lib/risk-share/riskShareTenantPublish.ts               scripts/verify-risk-share-manager-publish-revision-integration.mjs               scripts/verify-risk-share-manager-publish-api-contract.mjs               scripts/verify-risk-share-manager-publish-read-model-contract.mjs               scripts/verify-risk-share-manager-publish-ui-contract.mjs &&
            npm run build &&
            git grep -n "/api/risk-share/manager/publish" -- ':!scripts/**' &&
            ! git grep -n 'rpc/publish_risk_share_version_for_tenant`' -- 'src/**' &&
            git grep -n "rpc/publish_risk_share_version_for_tenant_checked" -- 'src/**' &&
            git diff --check origin/main...HEAD &&
            test -z "$(git diff --name-only origin/main...HEAD | grep '^supabase/' || true)"
          } > .tmp-pr916-revision-verify-log 2>&1
          status=$?
          printf '%s\n' "$status" > .tmp-pr916-revision-verify-status
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .tmp-pr916-revision-verify-log .tmp-pr916-revision-verify-status
          git commit -m "chore: record temporary PR 916 verification"
          git push origin HEAD:feat/add-manager-publish-ui
