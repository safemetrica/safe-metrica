name: Cleanup Temporary PR 917 Workflows

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    if: ${{ github.event.pull_request.number == 917 }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/add-tenant-publish-revision-guard
          fetch-depth: 0

      - name: Remove temporary files and push
        shell: bash
        run: |
          rm -f \
            .github/workflows/tmp-pr917-apply-approved-fixes.yml \
            .github/workflows/tmp-pr917-observe-approved-fixes.yml \
            .github/tmp_pr917_patch.py \
            .github/workflows/tmp-pr917-pull-request-patch.yml \
            .github/workflows/tmp-pr917-bigint-verify.yml \
            .github/workflows/tmp-pr917-cleanup.yml

          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove temporary PR 917 verification files"
          git push origin HEAD:feat/add-tenant-publish-revision-guard
