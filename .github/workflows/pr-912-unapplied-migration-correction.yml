name: PR 912 unapplied migration correction

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  correct-and-verify:
    if: github.head_ref == 'fix/align-tenant-publish-postcondition-alias'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: fix/align-tenant-publish-postcondition-alias
          fetch-depth: 0

      - name: Apply exact two-file correction
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          migration_path = Path("supabase/migrations/20260719020000_align_risk_share_publish_lock_order.sql")
          verifier_path = Path("scripts/verify-risk-share-tenant-publish-rpc-contract.mjs")

          migration = migration_path.read_text()
          old_tenant_expr = "v_tenant_definition !~* 'order by[[:space:]]+risk_share_items\\.id[[:space:]]+asc[[:space:]]+for update of risk_share_items'"
          new_tenant_expr = "v_tenant_definition !~* 'order by[[:space:]]+ri\\.id[[:space:]]+asc[[:space:]]+for update of ri'"
          if migration.count(old_tenant_expr) != 1:
              raise SystemExit(f"expected one old tenant apply-time expression, found {migration.count(old_tenant_expr)}")
          migration = migration.replace(old_tenant_expr, new_tenant_expr)
          migration_path.write_text(migration)

          verifier = verifier_path.read_text()
          durable_marker = "\n// E. Durable idempotency.\n"
          if verifier.count(durable_marker) != 1:
              raise SystemExit("durable idempotency marker not found exactly once")

          addition = '''
          const ownerApplyTimeLockRegex =
            /order\\s+by\\s+risk_share_items\\.id\\s+asc\\s+for\\s+update\\s+of\\s+risk_share_items/i;
          const tenantApplyTimeLockRegex =
            /order\\s+by\\s+ri\\.id\\s+asc\\s+for\\s+update\\s+of\\s+ri/i;

          check(
            "Owner apply-time regex matches the actual Owner function body",
            ownerApplyTimeLockRegex.test(ownerFn ?? ""),
          );
          check(
            "tenant apply-time regex matches the actual aliased tenant function body",
            tenantApplyTimeLockRegex.test(tenantFn ?? ""),
          );
          check(
            "Owner correction migration checks the exact Owner lock expression",
            ownerCorrectionSrc.includes(
              "v_owner_definition !~* 'order by[[:space:]]+risk_share_items\\\\.id[[:space:]]+asc[[:space:]]+for update of risk_share_items'",
            ),
          );
          check(
            "Owner correction migration checks the exact tenant alias expression",
            ownerCorrectionSrc.includes(
              "v_tenant_definition !~* 'order by[[:space:]]+ri\\\\.id[[:space:]]+asc[[:space:]]+for update of ri'",
            ),
          );
          check(
            "tenant apply-time check no longer requires the unaliased table name",
            !ownerCorrectionSrc.includes(
              "v_tenant_definition !~* 'order by[[:space:]]+risk_share_items\\\\.id[[:space:]]+asc[[:space:]]+for update of risk_share_items'",
            ),
          );
          '''
          verifier = verifier.replace(durable_marker, "\n" + addition + durable_marker)

          changed_files_start = verifier.index("const changedFiles = commandOutput")
          allowed_start = verifier.index("const allowedFiles = new Set([", changed_files_start)
          allowed_end = verifier.index("\n\nconst changedMigrations", allowed_start)
          new_allowed = '''const allowedFiles = new Set([VERIFIER_FILE, OWNER_CORRECTION_FILE]);
          check(
            "only the two approved correction files changed",
            changedFiles.length === 2 && changedFiles.every((file) => allowedFiles.has(file)),
          );'''
          verifier = verifier[:allowed_start] + new_allowed + verifier[allowed_end:]

          changed_migrations_start = verifier.index("const changedMigrations = commandOutput")
          migration_check_start = verifier.index('check(\n  "no existing main migration modified"', changed_migrations_start)
          migration_check_end = verifier.index("\n\nconst failures", migration_check_start)
          new_migration_check = '''check(
            "only the confirmed-unapplied Owner correction migration is modified",
            changedMigrations.length === 1 &&
              changedMigrations[0] === OWNER_CORRECTION_FILE,
          );'''
          verifier = verifier[:migration_check_start] + new_migration_check + verifier[migration_check_end:]
          verifier_path.write_text(verifier)
          PY

      - name: Commit intended product correction locally
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            supabase/migrations/20260719020000_align_risk_share_publish_lock_order.sql \
            scripts/verify-risk-share-tenant-publish-rpc-contract.mjs
          git commit -m "fix: align tenant publish migration postcondition"

      - name: Create local final-state verification commit
        shell: bash
        run: |
          git rm .github/workflows/pr-912-unapplied-migration-correction.yml
          git commit -m "chore: remove correction verification harness"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies and ripgrep
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep postgresql-client
          npm ci

      - name: Verify pg_get_functiondef alias contract
        env:
          PGPASSWORD: postgres
        shell: bash
        run: |
          psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
          create extension if not exists pgcrypto;
          create table public.risk_share_items (
            id uuid primary key default gen_random_uuid(),
            created_at timestamptz not null default now()
          );

          create or replace function public.test_owner_lock_order()
          returns void
          language plpgsql
          as $fn$
          begin
            perform risk_share_items.id
            from public.risk_share_items
            order by risk_share_items.id asc
            for update of risk_share_items;
          end;
          $fn$;

          create or replace function public.test_tenant_lock_order()
          returns void
          language plpgsql
          as $fn$
          begin
            perform ri.id
            from public.risk_share_items ri
            order by ri.id asc
            for update of ri;
          end;
          $fn$;

          do $check$
          declare
            v_owner_definition text;
            v_tenant_definition text;
          begin
            select pg_get_functiondef('public.test_owner_lock_order()'::regprocedure)
              into v_owner_definition;
            select pg_get_functiondef('public.test_tenant_lock_order()'::regprocedure)
              into v_tenant_definition;

            if v_owner_definition !~* 'order by[[:space:]]+risk_share_items\.id[[:space:]]+asc[[:space:]]+for update of risk_share_items' then
              raise exception 'Owner lock-order regex did not match pg_get_functiondef output';
            end if;

            if v_tenant_definition !~* 'order by[[:space:]]+ri\.id[[:space:]]+asc[[:space:]]+for update of ri' then
              raise exception 'tenant alias lock-order regex did not match pg_get_functiondef output';
            end if;

            if v_tenant_definition ~* 'order by[[:space:]]+risk_share_items\.id[[:space:]]+asc[[:space:]]+for update of risk_share_items' then
              raise exception 'old unaliased tenant regex unexpectedly matched';
            end if;
          end
          $check$;
          SQL

      - name: Run full verification
        shell: bash
        run: |
          npm run verify:risk-share-tenant-publish-rpc
          npm run verify:risk-share-preparation-read-model
          npm run verify:risk-share-preparation-api
          npm run verify:risk-share-preparation-ui
          npm run smoke:legacy-routes
          npm run build
          git diff --check origin/main...HEAD
          test "$(git diff --name-only origin/main...HEAD | wc -l)" -eq 2
          test "$(git diff --name-only origin/main...HEAD | sort)" = "$(printf '%s\n' scripts/verify-risk-share-tenant-publish-rpc-contract.mjs supabase/migrations/20260719020000_align_risk_share_publish_lock_order.sql | sort)"

      - name: Push verified product correction commit
        shell: bash
        run: |
          git push origin HEAD^:fix/align-tenant-publish-postcondition-alias
